name = "wildfire-alerts-control"
main = "index.js"
compatibility_date = "2024-09-23"

kv_namespaces = [
  { binding = "CONTROL_KV", id = "fc59cbe4cefb4fdcadc4cd5464683614" }
]

[triggers]
# Single tick every 15 minutes drives both the SMS fire-check engine and the
# trip-reminder check (see scheduled() in index.js) - each has its own
# interval-slot dedupe on top of this, configurable via text (CHECK EVERY /
# TRIP REMINDER EVERY), down to this 15-min floor. Free-tier cost: 96
# invocations/day, well under the 100k/day free request quota; each
# invocation is mostly awaited network I/O (CWFIS fetch, Nominatim, Twilio),
# which doesn't count against the Workers CPU-time limit the way active JS
# execution does - so this tick rate is effectively free regardless of how
# tight the configured cadences get, as long as neither goes below 15 min.
crons = ["*/15 * * * *"]
