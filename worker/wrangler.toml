[triggers]
# Every 1.5 hours: even hours at :00, odd hours at :30 - lands on a clean,
# evenly-spaced 90-minute cadence with no drift (00:00, 01:30, 03:00, ...).
crons = ["0 */2 * * *", "30 1-23/2 * * *"]
