name: Wildfire check and alert

on:
  schedule:
    # Every 20 minutes, skipping 08:00-10:59 UTC - the one stretch of the
    # day where no Canadian timezone's 8am-midnight local window can be
    # open. Keeps this comfortably under the 2,000 free Actions
    # minutes/month for a private repo (GitHub bills a minimum of 1
    # minute per run regardless of actual duration, so run *count* is
    # what matters, not run speed). The script tracks which 45-minute
    # slot it last alerted in (state/fires_seen.json) and fires when the
    # current tick has crossed into a new slot, so it works correctly at
    # any tick interval instead of requiring an exact alignment.
    - cron: "*/20 0-7,11-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run fire check
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_SHARED_SECRET: ${{ secrets.CF_API_SHARED_SECRET }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/check_and_alert.py

      - name: Commit updated fire state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/fires_seen.json
          git diff --staged --quiet || (git commit -m "Update fire state" && git push)
