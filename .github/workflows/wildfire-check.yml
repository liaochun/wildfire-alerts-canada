name: Wildfire check and alert

on:
  schedule:
    # Every 15 minutes, all day, every day (UTC). The script itself gates
    # on whether this tick falls inside the user's 8am-midnight local
    # window (45-minute slots) before doing any real work.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run fire check
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_API_SHARED_SECRET: ${{ secrets.CF_API_SHARED_SECRET }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/check_and_alert.py

      - name: Commit updated fire state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/fires_seen.json
          git diff --staged --quiet || (git commit -m "Update fire state" && git push)
